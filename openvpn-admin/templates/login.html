<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VPN 관리자</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e2e8f0;
  }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 25px 50px rgba(0,0,0,.5);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo svg { width: 48px; height: 48px; }
  h1 { font-size: 1.5rem; font-weight: 700; text-align: center; margin-top: 12px; }
  .sub { text-align: center; color: #64748b; font-size: .875rem; margin-top: 6px; }
  label { display: block; font-size: .875rem; color: #94a3b8; margin-bottom: 6px; margin-top: 20px; }
  input {
    width: 100%;
    padding: 12px 16px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 1rem;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: #3b82f6; }
  button {
    width: 100%;
    margin-top: 24px;
    padding: 13px;
    background: #3b82f6;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  button:hover { background: #2563eb; }
  button:disabled { background: #334155; cursor: not-allowed; }
  .error {
    margin-top: 14px;
    padding: 10px 14px;
    background: #450a0a;
    border: 1px solid #7f1d1d;
    border-radius: 8px;
    color: #fca5a5;
    font-size: .875rem;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="12" fill="#1e3a5f"/>
      <path d="M24 8L36 14V26C36 32.6 30.6 38.6 24 40C17.4 38.6 12 32.6 12 26V14L24 8Z"
            fill="#3b82f6" opacity=".8"/>
      <path d="M20 24L23 27L28 21" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>VPN 관리자</h1>
    <p class="sub">관리자 패널</p>
  </div>
  <label>관리자 비밀번호</label>
  <input type="password" id="pw" placeholder="비밀번호 입력" autofocus>
  <div class="error" id="err"></div>
  <button id="btn" onclick="doLogin()">로그인</button>
</div>
<script>
  document.getElementById('pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  async function doLogin() {
    const pw = document.getElementById('pw').value;
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    btn.disabled = true;
    err.style.display = 'none';
    const r = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw})
    });
    const d = await r.json();
    if (d.ok) {
      location.href = '/';
    } else {
      err.textContent = d.error || '오류';
      err.style.display = 'block';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>

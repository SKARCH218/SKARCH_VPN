# /etc/openvpn/server/udp-1703.conf
# Runs as systemd service:  openvpn-server@udp-1703
# UDP listener on the SAME port 1703 (separate instance + separate subnet).
# To use it, take the client .ovpn and change "proto tcp" -> "proto udp".

port 1703
proto udp
dev tun
topology subnet
explicit-exit-notify 1

# --- PKI (shared with the TCP instance) ---
ca   /etc/openvpn/server/ca.crt
cert /etc/openvpn/server/server.crt
key  /etc/openvpn/server/server.key
dh   none

# --- password-only auth, no client certificate (SoftEther style) ---
verify-client-cert none
username-as-common-name
duplicate-cn
script-security 2
tmp-dir /run/openvpn-server
auth-user-pass-verify /etc/openvpn/server/checkpass.sh via-file
client-connect        /etc/openvpn/server/client-connect.sh

# --- crypto ---
data-ciphers AES-256-GCM:AES-128-GCM:AES-128-CBC
data-ciphers-fallback AES-128-CBC
cipher AES-128-CBC
auth SHA1
tls-version-min 1.2
reneg-sec 0

# --- VPN network: DIFFERENT subnet than the TCP instance to avoid conflict ---
server 10.8.1.0 255.255.255.0
push "redirect-gateway def1 bypass-dhcp"
push "dhcp-option DNS 1.1.1.1"
push "dhcp-option DNS 8.8.8.8"
keepalive 10 120
tun-mtu 1400
mssfix 1300

# --- runtime / SD-card friendly ---
persist-key
persist-tun
status /run/openvpn-server/status-udp-1703.log 5
status-version 2
management /run/openvpn-server/mgmt-udp1703.sock unix
verb 1
mute 10

# /etc/openvpn/server/tcp443.conf
# Runs as systemd service:  openvpn-server@tcp443
# TCP listener on port 443 — looks like HTTPS, passes most firewalls.

port 443
proto tcp-server
dev tun
topology subnet

ca   /etc/openvpn/server/ca.crt
cert /etc/openvpn/server/server.crt
key  /etc/openvpn/server/server.key
dh   none

# --- password auth ---
verify-client-cert none
username-as-common-name
duplicate-cn
script-security 2
tmp-dir /run/openvpn-server
auth-user-pass-verify /etc/openvpn/server/checkpass.sh via-file
client-connect        /etc/openvpn/server/client-connect.sh

data-ciphers AES-256-GCM:AES-128-GCM:AES-128-CBC
data-ciphers-fallback AES-128-CBC
cipher AES-128-CBC
auth SHA1
tls-version-min 1.2
reneg-sec 0

server 10.8.2.0 255.255.255.0
push "redirect-gateway def1 bypass-dhcp"
push "dhcp-option DNS 1.1.1.1"
push "dhcp-option DNS 8.8.8.8"
keepalive 10 120
tun-mtu 1400
mssfix 1300

persist-key
persist-tun
status /run/openvpn-server/status-tcp443.log 5
status-version 2
management /run/openvpn-server/mgmt-tcp443.sock unix
verb 1
mute 10

# /etc/openvpn/server/tcp-1703.conf
# Runs as systemd service:  openvpn-server@tcp-1703
# TCP listener on port 1703 (matches the supplied SoftEther-style client).

port 1703
proto tcp-server
dev tun
topology subnet

# --- PKI (no tls-crypt/tls-auth, to match the supplied client) ---
ca   /etc/openvpn/server/ca.crt
cert /etc/openvpn/server/server.crt
key  /etc/openvpn/server/server.key
dh   none

# --- password-only auth, no client certificate (SoftEther style) ---
verify-client-cert none
username-as-common-name
duplicate-cn
script-security 2
tmp-dir /run/openvpn-server
auth-user-pass-verify /etc/openvpn/server/checkpass.sh via-file

# --- crypto: accept the client's AES-128-CBC / SHA1, allow GCM for newer clients ---
data-ciphers AES-256-GCM:AES-128-GCM:AES-128-CBC
data-ciphers-fallback AES-128-CBC
cipher AES-128-CBC
auth SHA1
tls-version-min 1.2
reneg-sec 0

# --- VPN network / pushed routes (full tunnel) ---
server 10.8.0.0 255.255.255.0
push "redirect-gateway def1 bypass-dhcp"
push "dhcp-option DNS 1.1.1.1"
push "dhcp-option DNS 8.8.8.8"
keepalive 10 120
tun-mtu 1400
mssfix 1300

# --- runtime / SD-card friendly: status on tmpfs, logs to journald(volatile), no persist files ---
persist-key
persist-tun
status /run/openvpn-server/status-tcp-1703.log 60
status-version 2
verb 1
mute 10
